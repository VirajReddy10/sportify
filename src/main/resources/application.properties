spring.application.name=sportify

# H2 in-memory database for fast local development
spring.datasource.url=jdbc:h2:mem:sportify
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Let Hibernate auto-create tables from our entities (fine for dev; we'll
# switch to managed migrations like Flyway before this matters for prod)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 web console, useful for poking at the DB during development
spring.h2.console.enabled=true
spring.h2.console.path=/h2-consolespring.application.name=sportify
spring.jpa.open-in-view=false
